<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>Birthday Countdown 🎉</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --primary: #ff4081;

      --secondary: #ff9800;

      --glass: rgba(255, 255, 255, 0.12);

      --glass-border: rgba(255, 255, 255, 0.25);
    }

    * {
      margin: 0;

      padding: 0;

      box-sizing: border-box;

      font-family: "Poppins", sans-serif;
    }

    body {
      /* This ensures vertical and horizontal centering on all devices */

      min-height: 100vh;

      width: 100%;

      display: flex;

      justify-content: center;

      align-items: center;

      color: white;

      background: #0f0c29;

      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url("https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=1600&q=80") no-repeat center/cover;

      background-attachment: fixed;

      padding: 20px;

      overflow-x: hidden;
    }

    /* ✨ Animated Particle Background */

    .particles {
      position: fixed;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      z-index: 0;

      pointer-events: none;
    }

    .particle {
      position: absolute;

      bottom: -50px;

      background: white;

      border-radius: 50%;

      opacity: 0.5;

      animation: rise 15s infinite ease-in;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);

        opacity: 0;
      }

      20% {
        opacity: 0.5;
      }

      100% {
        transform: translateY(-110vh) scale(1.5);

        opacity: 0;
      }
    }

    /* 🧊 Glass Card Container */

    .overlay {
      width: 100%;

      max-width: 450px;
      /* Standard mobile/tablet width */

      background: var(--glass);

      padding: clamp(25px, 6vw, 40px);

      border-radius: 30px;

      backdrop-filter: blur(25px);

      -webkit-backdrop-filter: blur(25px);

      border: 1px solid var(--glass-border);

      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);

      position: relative;

      z-index: 10;

      text-align: center;

      /* Adds a subtle inner glow for better glass effect */

      background-image: linear-gradient(135deg,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0));
    }

    h1 {
      font-family: "Dancing Script", cursive;

      font-size: clamp(2rem, 8vw, 2.6rem);

      margin-bottom: 25px;

      background: linear-gradient(to right, #fff, #ffd1ff, #ff80ab);

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

      filter: drop-shadow(0 5px 15px rgba(255, 64, 129, 0.4));
    }

    /* 🕰 Countdown Grid */

    .countdown {
      display: grid;

      grid-template-columns: repeat(2, 1fr);

      gap: 15px;

      margin-bottom: 25px;
    }

    .time-box {
      background: rgba(0, 0, 0, 0.25);

      padding: 18px 10px;

      border-radius: 20px;

      border: 1px solid rgba(255, 255, 255, 0.1);

      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .time-box h2 {
      font-size: clamp(1.8rem, 6vw, 2.4rem);

      font-weight: 700;

      color: #ffd700;

      line-height: 1;
    }

    .time-box p {
      font-size: 0.7rem;

      text-transform: uppercase;

      letter-spacing: 1.5px;

      opacity: 0.7;

      margin-top: 8px;

      font-weight: 500;
    }

    /* 💬 Message Styling */

    .message {
      min-height: 60px;

      font-size: clamp(0.95rem, 4vw, 1.1rem);

      color: #ffffff;

      margin-bottom: 25px;

      line-height: 1.6;

      background: rgba(255, 255, 255, 0.08);

      padding: 15px;

      border-radius: 15px;

      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* 🎁 Celebrate Button */

    .btn-wrap {
      position: relative;

      width: 100%;
    }

    .btn {
      width: 100%;

      padding: 18px;

      font-size: 1.1rem;

      font-weight: 700;

      border: none;

      border-radius: 50px;

      cursor: pointer;

      background: linear-gradient(45deg, var(--primary), var(--secondary));

      color: white;

      transition: 0.4s;

      box-shadow: 0 10px 25px rgba(255, 64, 129, 0.4);

      text-transform: uppercase;

      letter-spacing: 1px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-3px);

      box-shadow: 0 15px 30px rgba(255, 64, 129, 0.6);
    }

    .btn:disabled {
      background: linear-gradient(45deg, #444, #666);

      opacity: 0.7;

      cursor: not-allowed;

      box-shadow: none;
    }

    /* ☁ Tooltip */

    .tooltip {
      position: absolute;

      bottom: -45px;

      left: 50%;

      transform: translateX(-50%);

      background: rgba(0, 0, 0, 0.8);

      color: #fff;

      padding: 6px 15px;

      border-radius: 20px;

      font-size: 0.75rem;

      white-space: nowrap;

      opacity: 0;

      transition: 0.3s;

      pointer-events: none;

      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-wrap:hover .tooltip {
      opacity: 1;

      bottom: -50px;
    }

    /* Mobile Portrait optimization */

    @media (max-width: 400px) {
      .overlay {
        padding: 25px 18px;
      }

      .countdown {
        gap: 10px;
      }

      .time-box {
        padding: 15px 5px;
      }
    }
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>

  <div class="overlay">
    <h1>🎉 A Special Countdown 🎂</h1>

    <div class="countdown">
      <div class="time-box">
        <h2 id="days">00</h2>

        <p>Days</p>
      </div>

      <div class="time-box">
        <h2 id="hours">00</h2>

        <p>Hours</p>
      </div>

      <div class="time-box">
        <h2 id="minutes">00</h2>

        <p>Mins</p>
      </div>

      <div class="time-box">
        <h2 id="seconds">00</h2>

        <p>Secs</p>
      </div>
    </div>

    <div class="message" id="message">Loading Magic...</div>

    <div class="btn-wrap">
      <button id="celebrateBtn" class="btn" disabled>
        🎉 Celebrate Her Day
      </button>

      <span class="tooltip" id="tooltipMsg">Unlocked on 28th April 12:00 AM! 🌸</span>
    </div>
  </div>

  <!-- SAME HTML & CSS ABOVE (NO CHANGE) -->

  <script>
    /* ✨ Particles */
    const container = document.getElementById("particles");

    for (let i = 0; i < 20; i++) {
      const p = document.createElement("div");
      p.className = "particle";

      const size = Math.random() * 10 + 5 + "px";
      p.style.width = size;
      p.style.height = size;
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDelay = Math.random() * 10 + "s";
      p.style.background = `hsla(${Math.random() * 360}, 100%, 80%, 0.4)`;

      container.appendChild(p);
    }

    /* 🎂 Countdown Logic */
    const birthdayDate = new Date("April 28, 2026 00:00:00").getTime();

    const btn = document.getElementById("celebrateBtn");
    const msgEl = document.getElementById("message");

    btn.addEventListener("click", () => {
      window.location.href = "login.html";
    });

    function updateTimer() {
      const now = new Date().getTime();
      const distance = birthdayDate - now;

      const d = Math.floor(distance / (1000 * 60 * 60 * 24));
      const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((distance % (1000 * 60)) / 1000);

      // ⏰ Update UI
      document.getElementById("days").innerText = d < 10 ? "0" + d : d;
      document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
      document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
      document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

      /* 🎉 Conditions */

      // 🎂 Birthday reached
      if (distance <= 0) {
        clearInterval(timerInterval);

        document.getElementById("days").innerText = "00";
        document.getElementById("hours").innerText = "00";
        document.getElementById("minutes").innerText = "00";
        document.getElementById("seconds").innerText = "00";

        btn.disabled = false;
        btn.innerText = "🚀 Open Surprise Now";

        msgEl.innerHTML =
          "✨ It's finally here!<br><b>Happy Birthday!</b> 💖";

        document.getElementById("tooltipMsg").style.display = "none";
      }

      // ⏳ Last 1 day
      else if (d < 1) {
        msgEl.innerHTML = `<b>${h} hours</b> to go! 🌸<br>
    Almost there... get ready 🎂✨`;
      }

      // ⏳ Normal countdown
      else {
        if (d == 1) {
          msgEl.innerHTML = `<b>${d} Day</b> to go! 🌸<br>
    Advance Happy Birthday Wishes! 🎂`;
        }
        else {
          msgEl.innerHTML = `<b>${d} Days</b> to go! 🌸<br>
    Advance Happy Birthday Wishes! 🎂`;
        }
      }
    }

    const timerInterval = setInterval(updateTimer, 1000);
    updateTimer(); // initial call
  </script>
</body>

</html>
